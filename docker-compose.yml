name: notehub

services:

  # ==============================
  # PostgreSQL with pgvector
  # ==============================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: notehub-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - notehub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==============================
  # Ollama (Local AI - Llama 3)
  # ==============================
  ollama:
    image: ollama/ollama:latest
    container_name: notehub-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - notehub-network
    restart: unless-stopped
    # Pull the llama3 model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3 && wait"]

  # ==============================
  # NoteHub Backend (Express.js)
  # ==============================
  backend:
    build:
      context: ./notehub-backend
      dockerfile: Dockerfile
    image: notehub-backend:latest
    container_name: notehub-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 5300
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      CORS_ORIGIN: "http://localhost:80,http://localhost:8080,http://localhost"
      # Point AI to the Ollama container
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "5300:5300"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    networks:
      - notehub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5300/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==============================
  # NoteHub Frontend (React + Nginx)
  # ==============================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""   # Empty = relative URLs (nginx proxies /api/ to backend)
    image: notehub-frontend:latest
    container_name: notehub-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - notehub-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local
  uploads_data:
    driver: local

networks:
  notehub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
