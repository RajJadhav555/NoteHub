<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white">
    <div id="root"></div>

    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Your React App -->
    <script type="text/babel">
        const { useState } = React;

        function AdminDashboard() {
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
            const [showAdminSignupModal, setShowAdminSignupModal] = useState(false);
            const [adminEmail, setAdminEmail] = useState('');
            const [adminPassword, setAdminPassword] = useState('');

            const handleAdminLogin = () => {
                if (adminEmail && adminPassword) {
                    setIsAdminLoggedIn(true);
                    setShowAdminLoginModal(false);
                    alert('Admin Login Successful!');
                    setAdminEmail('');
                    setAdminPassword('');
                }
            };

            const handleAdminSignup = () => {
                if (adminEmail && adminPassword) {
                    setIsAdminLoggedIn(true);
                    setShowAdminSignupModal(false);
                    alert('Admin Account Created Successfully!');
                    setAdminEmail('');
                    setAdminPassword('');
                }
            };

            return (
                <div>
                    {/* Navigation Bar */}
                    <nav className="fixed top-0 w-full bg-slate-900/95 backdrop-blur-lg border-b border-white/10 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center space-x-3">
                                    <span className="text-2xl font-bold">NoteHub</span>
                                </div>
                                <h2 className="text-lg">Admin Dashboard</h2>
                            </div>
                        </div>
                    </nav>

                    {/* Admin Header */}
                    <div className="pt-16 bg-slate-900/95 backdrop-blur-lg border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold">Admin Dashboard</h1>
                                    <p className="text-sm text-gray-400">Manage and monitor NoteHub</p>
                                </div>
                                
                                <div className="flex items-center space-x-4">
                                    {!isAdminLoggedIn ? (
                                        <>
                                            <button 
                                                onClick={() => setShowAdminLoginModal(true)}
                                                className="px-4 py-2 bg-slate-800/50 border border-white/10 rounded-lg hover:border-blue-500 hover:text-blue-400 transition"
                                            >
                                                Admin Login
                                            </button>
                                            <button 
                                                onClick={() => setShowAdminSignupModal(true)}
                                                className="px-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg hover:shadow-lg transition"
                                            >
                                                Admin Signup
                                            </button>
                                        </>
                                    ) : (
                                        <button 
                                            onClick={() => {
                                                setIsAdminLoggedIn(false);
                                                setAdminEmail('');
                                                setAdminPassword('');
                                                alert('Logged out successfully!');
                                            }}
                                            className="px-4 py-2 bg-red-500/20 border border-red-500/50 rounded-lg hover:bg-red-500/30 transition text-red-400"
                                        >
                                            Logout
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        {isAdminLoggedIn ? (
                            <div className="bg-slate-800/50 border border-green-500/30 rounded-xl p-8 text-center">
                                <h2 className="text-2xl font-bold text-green-400 mb-2">✓ Admin Access Granted</h2>
                                <p className="text-gray-300">You now have full access to the admin dashboard features</p>
                            </div>
                        ) : (
                            <div className="bg-slate-800/50 border border-white/10 rounded-xl p-8 text-center">
                                <h2 className="text-2xl font-bold mb-2">Please Login</h2>
                                <p className="text-gray-400">Click on "Admin Login" or "Admin Signup" to get started</p>
                            </div>
                        )}
                    </div>

                    {/* Admin Login Modal */}
                    {showAdminLoginModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border border-white/10 rounded-xl p-8 max-w-md w-full">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold">Admin Login</h2>
                                    <button onClick={() => setShowAdminLoginModal(false)} className="text-gray-400 hover:text-white">
                                        ✕
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    <input
                                        type="email"
                                        placeholder="Admin Email"
                                        value={adminEmail}
                                        onChange={(e) => setAdminEmail(e.target.value)}
                                        className="w-full px-4 py-2 bg-slate-800/50 border border-white/10 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                                    />
                                    <input
                                        type="password"
                                        placeholder="Password"
                                        value={adminPassword}
                                        onChange={(e) => setAdminPassword(e.target.value)}
                                        className="w-full px-4 py-2 bg-slate-800/50 border border-white/10 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                                    />
                                    <button
                                        onClick={handleAdminLogin}
                                        className="w-full px-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg hover:shadow-lg transition font-semibold"
                                    >
                                        Login
                                    </button>
                                    <p className="text-center text-gray-400 text-sm">
                                        Don't have an account?{' '}
                                        <button
                                            onClick={() => {
                                                setShowAdminLoginModal(false);
                                                setShowAdminSignupModal(true);
                                            }}
                                            className="text-blue-400 hover:text-blue-300"
                                        >
                                            Sign up
                                        </button>
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Signup Modal */}
                    {showAdminSignupModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-900 border border-white/10 rounded-xl p-8 max-w-md w-full">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold">Admin Signup</h2>
                                    <button onClick={() => setShowAdminSignupModal(false)} className="text-gray-400 hover:text-white">
                                        ✕
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    <input
                                        type="email"
                                        placeholder="Admin Email"
                                        value={adminEmail}
                                        onChange={(e) => setAdminEmail(e.target.value)}
                                        className="w-full px-4 py-2 bg-slate-800/50 border border-white/10 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                                    />
                                    <input
                                        type="password"
                                        placeholder="Create Password"
                                        value={adminPassword}
                                        onChange={(e) => setAdminPassword(e.target.value)}
                                        className="w-full px-4 py-2 bg-slate-800/50 border border-white/10 rounded-lg focus:outline-none focus:border-blue-500 text-white"
                                    />
                                    <button
                                        onClick={handleAdminSignup}
                                        className="w-full px-4 py-2 bg-gradient-to-r from-green-500 to-emerald-600 rounded-lg hover:shadow-lg transition font-semibold"
                                    >
                                        Create Account
                                    </button>
                                    <p className="text-center text-gray-400 text-sm">
                                        Already have an account?{' '}
                                        <button
                                            onClick={() => {
                                                setShowAdminSignupModal(false);
                                                setShowAdminLoginModal(true);
                                            }}
                                            className="text-blue-400 hover:text-blue-300"
                                        >
                                            Login
                                        </button>
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render app
        ReactDOM.createRoot(document.getElementById('root')).render(<AdminDashboard />);
    </script>
</body>
</html>
